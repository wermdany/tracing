name: CI
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "master"
jobs:
  CI:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Installing Dependencies
        run: pnpm install

      - name: Running Eslint
        run: pnpm eslint

      - name: Running TSC
        run: pnpm test:tsc

      - name: Running Test
        run: pnpm test:coverage

      - name: Running Build
        run: pnpm build --t
